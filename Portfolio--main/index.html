
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Diamond Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        overflow-y: auto; /* allow mobile scrolling */
        overflow-x: hidden; /* prevent horizontal overflow */
        background: #000b2a;
      }
      .font-signature {
        font-family: 'Great Vibes', cursive;
      }
      .diamond-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
        transform: rotate(-45deg);
      }
      .diamond-item {
        transform: rotate(45deg);
      }
      .animated-bg {
        background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        position: relative;
        overflow: hidden;
      }
      .animated-bg::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
        animation: rotateBg 120s linear infinite;
        opacity: 0.3;
      }
      @keyframes rotateBg {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .shimmer {
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      
      .animate-scale-up {
        animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes scaleUp {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .animate-page-flip {
        transform-origin: left center;
        animation: pageFlip 0.8s cubic-bezier(0.3, 1, 0.4, 1) forwards;
      }
      @keyframes pageFlip {
        0% { transform: perspective(2500px) rotateY(-90deg) scale(0.9); opacity: 0; }
        100% { transform: perspective(2500px) rotateY(0deg) scale(1); opacity: 1; }
      }

      .animate-fade-in-right {
        animation: fadeInRight 0.6s ease-out;
      }
      @keyframes fadeInRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      /* Splash Animations */
      @keyframes logo-draw {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-logo {
        animation: logo-draw 1.5s ease-out forwards;
      }
      
      @keyframes text-reveal {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-text-reveal {
        opacity: 0;
        animation: text-reveal 1s ease-out 1s forwards;
      }

      /* Custom scrollbar */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Slide Animations for Education */
      @keyframes slideInLeft {
        0% { opacity: 0; transform: translateX(-100px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
        0% { opacity: 0; transform: translateX(100px); }
        100% { opacity: 1; transform: translateX(0); }
      }
    </style>

{
